<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ottimo — Generatore PSCL Light</title>
<style>
:root{
  --blue:#1d6fc4;--blue-dark:#154f96;--blue-light:#e8f2fc;
  --teal:#00b4a0;--orange:#f07010;--green:#28a745;--green-light:#eaf7ea;
  --gray:#f5f7fa;--border:#dde4ef;--text:#1a1a2e;--muted:#6b7a99;
  --font:'Segoe UI',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:#eef2f9;color:var(--text);min-height:100vh}
nav{background:var(--blue-dark);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.25)}
.nl{display:flex;align-items:center;gap:10px}
.nl-box{background:#fff;border-radius:6px;padding:3px 10px;font-weight:800;font-size:15px;color:var(--blue-dark)}
.nl-txt{color:#fff;font-size:13px;opacity:.8}
.nl-step{color:rgba(255,255,255,.55);font-size:12px}
.app{max-width:1080px;margin:0 auto;padding:22px 18px 70px}
.prog-wrap{background:#fff;border-radius:11px;padding:14px 18px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.prog{display:flex;gap:3px}
.ps{flex:1;text-align:center;padding:7px 3px;border-radius:7px;font-size:10.5px;cursor:pointer;line-height:1.3;transition:.15s}
.ps.done{background:var(--blue-light);color:var(--blue)}
.ps.active{background:var(--blue);color:#fff;font-weight:700}
.ps.todo{background:#f0f0f0;color:#bbb}
.ps-n{display:block;font-size:9.5px;opacity:.65}
.card{background:#fff;border-radius:12px;padding:26px 30px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:18px}
.ctitle{font-size:19px;font-weight:700;color:var(--blue);margin-bottom:4px}
.csub{color:var(--muted);font-size:13px;margin-bottom:20px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.cf{grid-column:1/-1}
label.fl{display:block;font-weight:600;font-size:13px;margin-bottom:3px}
.fh{font-size:11px;color:var(--muted);margin-bottom:5px}
input[type=text],input[type=number],textarea{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:var(--font);outline:none;transition:.15s}
input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,111,196,.1)}
textarea{resize:vertical;min-height:88px}
.yn{display:flex;gap:7px;margin-top:2px}
.yn button{padding:6px 20px;border-radius:7px;border:2px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.yn button.ay{background:var(--blue);color:#fff;border-color:var(--blue)}
.yn button.an{background:#f0f0f0;color:#555;border-color:#ccc}
.cbox{background:#fffae8;border:1.5px solid #e8c840;border-radius:10px;padding:14px 16px;margin-top:6px}
.ctit{font-weight:700;color:#8a6000;margin-bottom:8px;font-size:13px}
.cpar{font-size:11.5px;color:#7a5800;margin-bottom:10px;line-height:1.6}
.rbox{background:var(--green-light);border:1.5px solid #5cb85c;border-radius:10px;padding:12px 14px;margin-top:10px}
.rtit{font-weight:700;color:#2d7a2d;margin-bottom:7px;font-size:12.5px}
table.rt{width:100%;border-collapse:collapse;font-size:12.5px}
table.rt th{text-align:left;padding:4px 8px;color:#2d7a2d;font-size:11.5px;border-bottom:1.5px solid #a0d0a0}
table.rt th.r,table.rt td.r{text-align:right}
table.rt td{padding:4px 8px;border-bottom:1px solid #d4edd4}
table.rt tr.tot td{font-weight:700;color:#2d7a2d;border-top:2px solid #5cb85c;border-bottom:none}
.isl{border:2.5px dashed #b0c8e0;border-radius:10px;background:#f4f8ff;margin:12px 0;overflow:hidden}
.ish{background:#dceeff;padding:9px 14px;display:flex;align-items:center;justify-content:space-between}
.isl-lbl{font-size:11.5px;font-weight:700;color:var(--blue)}
.isl-sub{font-size:10.5px;color:#5080a0}
.isb{padding:14px;display:flex;flex-direction:column;align-items:center;gap:9px}
.isb.hi{padding:0}
.isb img{width:100%;display:block;border-radius:0 0 8px 8px;max-height:300px;object-fit:contain}
.ibtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.ibtn{padding:7px 16px;border-radius:7px;border:none;font-size:12.5px;font-weight:600;cursor:pointer}
.ibtn.p{background:var(--blue);color:#fff}
.ibtn.s{background:#fff;color:var(--blue);border:2px solid var(--blue)}
.ibtn.d{background:#fff;color:#c03030;border:2px solid #c03030;font-size:11px;padding:4px 12px}
.ihint{font-size:11px;color:#8090b0;text-align:center}
.nbtns{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.nb{padding:10px 26px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
.nb.prev{background:var(--blue-light);color:var(--blue)}
.nb.prev:disabled{background:#eee;color:#bbb;cursor:default}
.nb.next{background:var(--blue);color:#fff}
.nb.next:hover{background:var(--blue-dark)}
.nb.gen{background:var(--green);color:#fff}
#report-view{display:none}
.rw{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.12);overflow:hidden;max-width:1050px;margin:0 auto}
.rcov{background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 55%,var(--teal) 100%);color:#fff;padding:46px 52px 38px;display:grid;grid-template-columns:1fr 200px;align-items:center;gap:28px;min-height:220px}
.rbadge{background:rgba(255,255,255,.2);border-radius:5px;padding:3px 12px;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;display:inline-block;margin-bottom:12px}
.rcomp{font-size:30px;font-weight:800;line-height:1.2;margin-bottom:6px}
.rtitle{font-size:17px;opacity:.9;margin-bottom:10px}
.rmeta{font-size:12.5px;opacity:.75;line-height:1.9}
.rlogo-box{background:rgba(255,255,255,.15);border-radius:10px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:8px}
.rlogo-img{width:160px;height:80px;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:6px;background:rgba(255,255,255,.1)}
.rlogo-img img{max-width:150px;max-height:76px;object-fit:contain}
.rconf{background:rgba(255,255,255,.2);border-radius:6px;padding:6px 12px;text-align:center;font-size:11px;font-weight:700;width:100%;color:#fff}
.rsh{position:relative;overflow:hidden;min-height:72px;display:flex;align-items:center;padding:0 52px}
.rsh-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.35) saturate(.8)}
.rsh-grad{position:absolute;inset:0;background:linear-gradient(90deg,rgba(21,79,150,.85) 0%,rgba(29,111,196,.6) 60%,rgba(0,180,160,.4) 100%)}
.rsh-inner{position:relative;z-index:1;display:flex;align-items:center;gap:14px}
.rsh-num{font-size:32px;font-weight:800;color:rgba(255,255,255,.3);line-height:1}
.rsh-title{font-size:16px;font-weight:700;color:#fff}
.rc{padding:28px 52px}
.rh4{font-size:13.5px;font-weight:700;color:var(--orange);margin:20px 0 7px;border-left:4px solid var(--orange);padding-left:9px}
.rp{font-size:13px;line-height:1.8;margin-bottom:10px}
.rp strong{color:var(--blue-dark)}
.krow{display:flex;gap:12px;margin:14px 0;flex-wrap:wrap}
.kpi{flex:1;min-width:110px;background:var(--gray);border-radius:9px;padding:12px 14px;border-left:4px solid var(--blue)}
.kv{font-size:24px;font-weight:800;color:var(--blue);line-height:1}
.kl{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}
.kpi.g{border-color:var(--green)}.kpi.g .kv{color:var(--green)}
.kpi.o{border-color:var(--orange)}.kpi.o .kv{color:var(--orange)}
.kpi.r{border-color:#c03030}.kpi.r .kv{color:#c03030}
.etw{background:var(--green-light);border:1.5px solid #5cb85c;border-radius:10px;padding:14px;margin:12px 0}
.ett{font-weight:700;color:#2d7a2d;margin-bottom:8px;font-size:13px}
table.et{width:100%;border-collapse:collapse;font-size:12.5px}
table.et th{color:#2d7a2d;padding:5px 10px;border-bottom:1.5px solid #a0d0a0;font-size:12px;text-align:left}
table.et th.r,table.et td.r{text-align:right}
table.et td{padding:5px 10px;border-bottom:1px solid #d4edd4}
table.et tr.tot td{font-weight:700;color:#2d7a2d;border-top:2px solid #5cb85c;border-bottom:none}
.en{font-size:11px;color:#60a060;margin-top:7px}
table.mt{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
table.mt th{background:var(--blue);color:#fff;padding:7px 12px;text-align:left;font-size:12px}
table.mt th.r,table.mt td.r{text-align:right}
table.mt td{padding:7px 12px;border-bottom:1px solid var(--border)}
.dn{color:#c03030;font-weight:700}.up{color:var(--green);font-weight:700}
.mlist{background:var(--gray);border-radius:9px;padding:14px 18px;font-size:13px;line-height:1.9;white-space:pre-wrap;border-left:4px solid var(--blue);margin:10px 0}
.norm-li{font-size:13px;line-height:1.9;padding-left:16px}
.norm-li li{margin-bottom:2px}
.rfoot{background:var(--blue-dark);color:rgba(255,255,255,.55);padding:14px 52px;font-size:11px;display:flex;justify-content:space-between}
.ebar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;background:#fff;border-radius:11px;padding:12px 18px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.ebar-title{font-size:16px;font-weight:700;color:var(--blue)}
.ebtns{display:flex;gap:9px;flex-wrap:wrap}
.ebtn{padding:9px 20px;border-radius:7px;border:none;font-size:13px;font-weight:700;cursor:pointer}
.ebtn.back{background:var(--blue-light);color:var(--blue)}
.ebtn.pdf{background:var(--orange);color:#fff}
.ebtn.html{background:var(--green);color:#fff}
@media print{
  nav,.prog-wrap,.nbtns,#form-view,.ebar{display:none!important}
  #report-view{display:block!important}
  .rw{box-shadow:none;border-radius:0}
  .rcov,.rsh,.rsh-bg,.rsh-grad{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{background:#fff}
}
@media(max-width:680px){
  .fg,.fg3{grid-template-columns:1fr}
  .rcov{grid-template-columns:1fr}
  .rc,.rsh{padding-left:20px;padding-right:20px}
  .rfoot{padding:12px 20px;flex-direction:column;gap:3px}
}
</style>
</head>
<body>

<nav>
  <div class="nl">
    <span class="nl-box">Ottimo</span>
    <span class="nl-txt">Generatore PSCL Light</span>
  </div>
  <span class="nl-step" id="nav-info">D.I. 179/2021 conforme</span>
</nav>

<div class="app">
  <div class="prog-wrap"><div class="prog" id="prog"></div></div>
  <div id="form-view"></div>
  <div id="report-view">
    <div class="ebar">
      <div class="ebar-title">📄 PSCL generato — pronto per export</div>
      <div class="ebtns">
        <button class="ebtn back" onclick="goTo(STEPS.length-2)">← Modifica</button>
        <button class="ebtn pdf" onclick="window.print()">🖨️ Stampa / PDF</button>
        <button class="ebtn html" onclick="downloadHTML()">⬇️ Scarica HTML</button>
      </div>
    </div>
    <div class="rw" id="rc"></div>
  </div>
  <div class="nbtns" id="nbtns">
    <button class="nb prev" id="bp" onclick="prevStep()" disabled>← Indietro</button>
    <button class="nb next" id="bn" onclick="nextStep()">Avanti →</button>
  </div>
</div>

<input type="file" id="fi" accept="image/*" style="display:none"/>

<script>
const D={
  nome_azienda:'',nome_mm:'',anno:new Date().getFullYear(),
  via:'',comune:'',cap:'',
  totale:'',analizzati:'',risposte:'',
  orario_in:'8:00',orario_out:'18:00',
  navetta:false,carpooling:false,tpl_incentivi:false,bike_work:false,
  smart_working:false,mensa:false,docce:false,
  posti_auto:'0',posti_bici:'0',
  stazione:false,metro:false,bus:false,bike_sharing:false,car_sharing:false,piste:false,
  n_auto:'',n_tpl:'',n_attiva:'',dist_km:'',prop_pct:'41',
  misure_text:'',proc1:'0',proc2:'0',proc3:'0',monitor_note:'',
  logo_data:null,
  img_tpl:null,img_ciclabili:null,img_isocrone:null,
  img_distrib:null,img_grafici:null,img_propensione:null,img_gantt:null,
};

const STEPS=['Azienda & Sede','Personale','Dotazioni','Trasporto','Mobilità','Misure','Monitoraggio','Genera PSCL'];
let cur=0,pendImg=null;
const $=id=>document.getElementById(id);
const num=k=>Number(D[k])||0;

function calcProc(u,dk){
  const a=Number(u)||0,b=1.2,c=(Number(dk)||0)*2,d=45;
  return{CO2:(((a/b)*c)*d*161.71922/1000).toFixed(2),NOx:(((a/b)*c)*d*0.304687/1000).toFixed(2),PM10:(((a/b)*c)*d*0.030991/1000).toFixed(2),n:a};
}
function calcs(){
  const p1=calcProc(D.proc1,D.dist_km),p2=calcProc(D.proc2,D.dist_km),p3={CO2:'0.00',NOx:'0.00',PM10:'0.00',n:num('proc3')};
  return{p1,p2,p3,tot:{CO2:(+p1.CO2+ +p2.CO2).toFixed(2),NOx:(+p1.NOx+ +p2.NOx).toFixed(2),PM10:(+p1.PM10+ +p2.PM10).toFixed(2),n:p1.n+p2.n+p3.n}};
}

function bindInput(id,key){const el=$(id);if(!el)return;el.value=D[key]??'';el.addEventListener('input',()=>{D[key]=el.value;if(cur===5)updateCalcPrev();if(cur===4)updateModalSum();});}

function bindYN(key){
  document.querySelectorAll(`[data-yn="${key}"]`).forEach(btn=>{
    const v=btn.dataset.val==='true';
    btn.className='yn button'+(D[key]===v?(v?' ay':' an'):'');
    btn.onclick=()=>{D[key]=v;document.querySelectorAll(`[data-yn="${key}"]`).forEach(b=>{const bv=b.dataset.val==='true';b.className='yn button'+(D[key]===bv?(bv?' ay':' an'):'');});};
  });
}

function updateCalcPrev(){
  const c=calcs();
  const u=(id,v)=>{const e=$(id);if(e)e.textContent=v;};
  u('pdist',(num('dist_km')*2)+' km');
  ['p1','p2','p3','tot'].forEach(p=>{u(`p-${p}-n`,c[p].n);u(`p-${p}-co2`,c[p].CO2);u(`p-${p}-nox`,c[p].NOx);u(`p-${p}-pm`,c[p].PM10);});
}
function updateModalSum(){
  const t=(num('n_auto')+num('n_tpl')+num('n_attiva'))||1;
  const u=(id,v)=>{const e=$(id);if(e)e.textContent=v;};
  u('ms-tot',t);u('ms-auto',D.n_auto+' ('+(num('n_auto')/t*100).toFixed(1)+'%)');u('ms-tpl',D.n_tpl+' ('+(num('n_tpl')/t*100).toFixed(1)+'%)');u('ms-att',D.n_attiva+' ('+(num('n_attiva')/t*100).toFixed(1)+'%)');
}

function setupSlot(sid,dk){
  const slot=$(sid);if(!slot)return;
  const body=slot.querySelector('.isb');
  if(D[dk]){body.classList.add('hi');body.innerHTML=`<img src="${D[dk]}" alt="img"/><button class="ibtn d" style="margin:8px" onclick="clearImg('${dk}','${sid}')">✕ Rimuovi</button>`;}
  else{body.classList.remove('hi');body.innerHTML=`<div class="ibtns"><button class="ibtn p" onclick="trigUp('${dk}','${sid}')">⬆️ Carica da computer</button><button class="ibtn s" onclick="trigPaste('${dk}','${sid}')">📋 Incolla screenshot</button></div><p class="ihint">Screenshot da Ottimo Expert → carica qui. Appare nel report finale.</p>`;}
}
function trigUp(dk,sid){pendImg={dk,sid};$('fi').click();}
function clearImg(dk,sid){D[dk]=null;setupSlot(sid,dk);}
function trigPaste(dk,sid){
  pendImg={dk,sid};
  navigator.clipboard.read().then(items=>{
    for(const it of items){const t=it.types.find(x=>x.startsWith('image/'));if(t){it.getType(t).then(blob=>{const r=new FileReader();r.onload=e=>{D[dk]=e.target.result;setupSlot(sid,dk);};r.readAsDataURL(blob);});return;}}
    alert('Geen afbeelding gevonden. Kopieer eerst de screenshot (Ctrl+C).');
  }).catch(()=>alert('Klembord-toegang geweigerd. Gebruik "Carica da computer".'));
}
$('fi').addEventListener('change',function(){
  if(!this.files[0]||!pendImg)return;
  const r=new FileReader();
  r.onload=e=>{
    D[pendImg.dk]=e.target.result;
    if(pendImg.isLogo){const la=$('logo-area');if(la)la.innerHTML=`<img src="${D.logo_data}" style="max-width:160px;max-height:82px;object-fit:contain"/>`;}
    else setupSlot(pendImg.sid,pendImg.dk);
    pendImg=null;
  };
  r.readAsDataURL(this.files[0]);this.value='';
});

function islHTML(id,dk,lbl,hint){
  return`<div class="isl" id="${id}"><div class="ish"><span class="isl-lbl">📷 ${lbl}</span><span class="isl-sub">${hint}</span></div><div class="isb"></div></div>`;
}
function ynF(lbl,key){
  return`<div><label class="fl">${lbl}</label><div class="yn"><button data-yn="${key}" data-val="true" class="yn button${D[key]?' ay':''}">Sì</button><button data-yn="${key}" data-val="false" class="yn button${!D[key]?' an':''}">No</button></div></div>`;
}

const PHOTOS=[
  'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=900&q=60',
  'https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?w=900&q=60',
  'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=900&q=60',
  'https://images.unsplash.com/photo-1496450681664-3df85efbd29f?w=900&q=60',
  'https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=900&q=60',
];
function secH(n,title,pi){
  return`<div class="rsh"><div class="rsh-bg" style="background-image:url('${PHOTOS[pi]||PHOTOS[0]}')"></div><div class="rsh-grad"></div><div class="rsh-inner"><div class="rsh-num">${n}</div><div class="rsh-title">${title}</div></div></div>`;
}

function s0(){return`<div class="card"><div class="ctitle">🏢 Azienda & Sede</div><div class="csub">Dati identificativi dell'organizzazione</div>
<div class="fg">
  <div class="cf"><label class="fl">Logo aziendale</label><div class="fh">Apparirà sul frontespizio del report</div>
    <div id="logo-area" onclick="pendImg={dk:'logo_data',sid:'logo-area',isLogo:true};$('fi').click()" style="width:170px;height:88px;border:2px dashed var(--border);border-radius:9px;background:var(--gray);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden">
      ${D.logo_data?`<img src="${D.logo_data}" style="max-width:160px;max-height:82px;object-fit:contain"/>`:`<div style="text-align:center;color:var(--muted);font-size:12px;padding:8px">📷 Carica logo</div>`}
    </div>
  </div>
  <div><label class="fl">Nome azienda</label><input id="f-company" value="${D.nome_azienda}"/></div>
  <div><label class="fl">Mobility Manager</label><input id="f-mm" value="${D.nome_mm}"/></div>
  <div><label class="fl">Anno del piano</label><input id="f-anno" type="number" value="${D.anno}"/></div>
  <div></div>
  <div><label class="fl">Via e numero civico</label><input id="f-via" value="${D.via}"/></div>
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:10px">
    <div><label class="fl">Comune</label><input id="f-comune" value="${D.comune}"/></div>
    <div><label class="fl">CAP</label><input id="f-cap" value="${D.cap}"/></div>
  </div>
</div></div>`;}

function s1(){return`<div class="card"><div class="ctitle">👥 Personale & Orari</div><div class="csub">Dimensione e partecipazione all'indagine</div>
<div class="fg">
  <div><label class="fl">Totale personale</label><input id="f-totale" type="number" value="${D.totale}"/></div>
  <div><label class="fl">Personale nell'indagine</label><input id="f-analiz" type="number" value="${D.analizzati}"/></div>
  <div><label class="fl">Risposte ricevute</label><input id="f-risp" type="number" value="${D.risposte}"/></div>
  <div></div>
  <div><label class="fl">Orario ingresso</label><input id="f-orin" value="${D.orario_in}"/></div>
  <div><label class="fl">Orario uscita</label><input id="f-orout" value="${D.orario_out}"/></div>
</div></div>`;}

function s2(){return`<div class="card"><div class="ctitle">🚗 Dotazioni & Servizi</div><div class="csub">Servizi e infrastrutture di mobilità già attivi</div>
<div class="fg">
  ${ynF('Servizio navetta privata','navetta')}
  ${ynF('Piattaforma carpooling','carpooling')}
  ${ynF('Incentivi abbonamenti TPL','tpl_incentivi')}
  ${ynF('Incentivi Bike to Work','bike_work')}
  ${ynF('Politica smart working','smart_working')}

  $('rc').innerHTML=`
  <div class="rcov">
    <div>

      <div class="rcomp">${D.nome_azienda||'[Azienda]'}</div>

      <div class="kpi"><div class="kv">${D.totale||'—'}</div><div class="kl">Dipendenti totali</div></div>

      <tr><td>🚗 Auto / moto</td><td class="r">${D.n_auto} (${pA}%)</td><td class="r">${nA2} (${pA2}%)</td><td class="r"><span class="dn">−${c.tot.n}</span></td></tr>

  .norm-li{font-size:13px;line-height:1.9;padding-left:16px}.norm-li li{margin-bottom:2px}
  .rfoot{background:#154f96;color:rgba(255,255,255,.55);padding:14px 52px;font-size:11px;display:flex;justify-content:space-between}
  img{max-width:100%;border-radius:8px;margin:12px 0;display:block}
  @media print{.rcov,.rsh{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
  </style></head><body>${$('rc').innerHTML}</body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`PSCL_${(D.nome_azienda||'report').replace(/\s+/g,'_')}_${D.anno}.html`;a.click();
}

const SR=[s0,s1,s2,s3,s4,s5,s6];
function goTo(n){
  cur=n;
  const fv=$('form-view'),rv=$('report-view'),nb=$('nbtns');
  if(n===STEPS.length-1){fv.style.display='none';rv.style.display='block';nb.style.display='none';renderReport();}
  else{
    fv.style.display='block';rv.style.display='none';nb.style.display='flex';
    $('form-view').innerHTML=SR[n]();
    [['f-company','nome_azienda'],['f-mm','nome_mm'],['f-via','via'],['f-comune','comune'],['f-cap','cap'],
     ['f-totale','totale'],['f-analiz','analizzati'],['f-risp','risposte'],['f-orin','orario_in'],['f-orout','orario_out'],
     ['f-pauto','posti_auto'],['f-pbici','posti_bici'],['f-nauto','n_auto'],['f-ntpl','n_tpl'],['f-natt','n_attiva'],
     ['f-dist','dist_km'],['f-misure','misure_text'],['f-monitor','monitor_note'],
    ].forEach(([id,k])=>bindInput(id,k));
    const fa=$('f-anno');if(fa){fa.value=D.anno;fa.addEventListener('input',()=>D.anno=fa.value);}
    ['navetta','carpooling','tpl_incentivi','bike_work','smart_working','mensa','docce',
     'stazione','metro','bus','bike_sharing','car_sharing','piste'].forEach(k=>bindYN(k));
    [['sl-tpl','img_tpl'],['sl-cicl','img_ciclabili'],['sl-iso','img_isocrone'],
     ['sl-dist','img_distrib'],['sl-graf','img_grafici'],['sl-prop','img_propensione'],['sl-gantt','img_gantt']
    ].forEach(([s,d])=>setupSlot(s,d));
    if(n===5)updateCalcPrev();if(n===4)updateModalSum();
  }
  $('prog').innerHTML=STEPS.map((l,i)=>`<div class="ps ${i<cur?'done':i===cur?'active':'todo'}" onclick="goTo(${i})"><span class="ps-n">${i+1}</span>${l}</div>`).join('');
  $('nav-info').textContent=`Passaggio ${cur+1} di ${STEPS.length}`;
  const bp=$('bp'),bn=$('bn');
  if(bp&&bn){bp.disabled=cur===0;const last=cur===STEPS.length-2;bn.textContent=last?'🚀 Genera PSCL →':'Avanti →';bn.className='nb '+(last?'gen':'next');}
  window.scrollTo({top:0,behavior:'smooth'});
}
function nextStep(){if(cur<STEPS.length-1)goTo(cur+1);}
function prevStep(){if(cur>0)goTo(cur-1);}
goTo(0);
</script>
