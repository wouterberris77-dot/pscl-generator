<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ottimo — Generatore PSCL</title>
<style>
:root{--blue:#2563eb;--dark:#0f172a;--orange:#f07010;--green:#16a34a;--gray:#f8fafc;--border:#e5e7eb;--muted:#6b7280;--font:'Segoe UI',Arial,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:#eef2f9;color:#111;display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--dark);color:#fff;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100}
.slogo{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.slogo-txt{color:#fff;font-weight:800;font-size:16px}
.ssec{padding:14px 12px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:1px;text-transform:uppercase}
.sitem{display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:13px;color:rgba(255,255,255,.65);cursor:pointer;border-radius:6px;margin:1px 8px;transition:.15s}
.sitem:hover{background:rgba(255,255,255,.08);color:#fff}
.sitem.active{background:var(--blue);color:#fff;font-weight:600}
.sitem.done{color:rgba(255,255,255,.85)}
.main{margin-left:220px;flex:1}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-t{font-size:15px;font-weight:700}
.topbar-s{font-size:13px;color:var(--muted)}
.content{padding:22px 28px 60px;max-width:900px}
.card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:24px 28px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.ctit{font-size:18px;font-weight:700;color:var(--blue);margin-bottom:4px}
.csub{font-size:13px;color:var(--muted);margin-bottom:20px}
.sbadge{display:inline-flex;align-items:center;background:#eff6ff;color:var(--blue);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.cf{grid-column:1/-1}
.fg label,.fg3 label,.cf label{display:block;font-weight:600;font-size:13px;margin-bottom:3px}
.fh{font-size:11px;color:var(--muted);margin-bottom:5px}
input[type=text],input[type=number],input[type=date],textarea,select{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:var(--font);outline:none;background:#fff;transition:.15s}
input:focus,textarea:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea{resize:vertical;min-height:90px}
input[type=color]{width:100%;height:42px;padding:4px 6px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;background:#fff}
.yn{display:flex;gap:8px;margin-top:3px}
.ynb{padding:7px 22px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;color:var(--muted)}
.ynb.ay{background:var(--blue);color:#fff;border-color:var(--blue)}
.ynb.an{background:#f9fafb;color:#333;border-color:var(--border)}
.isl{border:2px dashed #c7d2fe;border-radius:10px;background:#f8faff;margin-bottom:12px;overflow:hidden}
.ish{background:#e0e7ff;padding:9px 14px;display:flex;align-items:center;justify-content:space-between}
.isl-l{font-size:11.5px;font-weight:700;color:#3730a3}
.isl-h{font-size:10.5px;color:#6366f1}
.isb{padding:14px;display:flex;flex-direction:column;align-items:center;gap:9px}
.isb.hi{padding:0}
.isb img{width:100%;display:block;max-height:280px;object-fit:contain}
.ibtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.ibtn{padding:7px 16px;border-radius:8px;border:none;font-size:12.5px;font-weight:600;cursor:pointer}
.ibtn.up{background:var(--blue);color:#fff}
.ibtn.pa{background:#fff;color:var(--blue);border:1.5px solid var(--blue)}
.ibtn.rm{background:#fff;color:#dc2626;border:1.5px solid #fca5a5;font-size:11px;padding:4px 12px;margin:8px}
.inote{font-size:11px;color:#818cf8;text-align:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.nbtns{display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding-bottom:20px}
.nb{padding:10px 26px;border-radius:9px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
.nb.prev{background:#eff6ff;color:var(--blue)}
.nb.prev:disabled{background:#f3f4f6;color:#d1d5db;cursor:default}
.nb.next{background:var(--blue);color:#fff}
.nb.gen{background:var(--green);color:#fff}
.cbox{background:#fffae8;border:1.5px solid #fde047;border-radius:10px;padding:14px 16px;margin-top:6px}
.ctit2{font-weight:700;color:#854d0e;margin-bottom:6px;font-size:13px}
.cpar{font-size:11.5px;color:#92400e;margin-bottom:12px;line-height:1.6}
.rbox{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:12px 14px;margin-top:12px}
.rtit{font-weight:700;color:#15803d;margin-bottom:7px;font-size:13px}
table.ct{width:100%;border-collapse:collapse;font-size:12.5px}
table.ct th{text-align:left;padding:4px 8px;color:#15803d;font-size:12px;border-bottom:1.5px solid #86efac;font-weight:700}
table.ct th.r,table.ct td.r{text-align:right}
table.ct td{padding:4px 8px;border-bottom:1px solid #dcfce7}
table.ct tr.tot td{font-weight:700;color:#15803d;border-top:2px solid #86efac;border-bottom:none}
#rv{display:none}
.rw{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.1);overflow:hidden;max-width:1050px;margin:0 auto}
.krow{display:flex;gap:12px;margin:14px 0;flex-wrap:wrap}
.kpi{flex:1;min-width:110px;background:#f8fafc;border-radius:9px;padding:12px 14px;border-left:4px solid var(--blue)}
.kv{font-size:24px;font-weight:800;color:var(--blue);line-height:1}
.kl{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}
.ebar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;background:#fff;border-radius:11px;padding:12px 18px;border:1px solid var(--border)}
.ebar-t{font-size:16px;font-weight:700;color:var(--blue)}
.ebtns{display:flex;gap:8px;flex-wrap:wrap}
.ebtn{padding:9px 20px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer}
.ebtn.back{background:#eff6ff;color:var(--blue)}
.ebtn.pdf{background:var(--orange);color:#fff}
.ebtn.word{background:#2b579a;color:#fff}
.style-preview{border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.1);margin-top:8px}
.color-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:4px}
.color-item label{font-size:12px;font-weight:600;color:#374151;margin-bottom:4px;display:block}
.plan-table{width:100%;border-collapse:collapse}
.plan-table th{background:#0f172a;color:rgba(255,255,255,.8);padding:9px 12px;font-size:12px;text-align:left}
.plan-table td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
@media print{
  .sidebar,.topbar,.nbtns,#fv,.ebar{display:none!important}
  #rv{display:block!important}
  .rw{box-shadow:none;border-radius:0}
  body{background:#fff;margin:0;padding:0}
  .main{margin-left:0}

  @page{margin:0;size:A4 portrait}

  *{
    -webkit-print-color-adjust:exact!important;
    print-color-adjust:exact!important;
    color-adjust:exact!important;
  }

  /* Cover: exact A4 */
  .cover-block{
    width:210mm !important;
    height:297mm !important;
    max-height:297mm !important;
    overflow:hidden !important;
    page-break-after:always !important;
    break-after:page !important;
    margin:0 !important;
    padding:0 !important;
    position:relative !important;
  }

  /* Content wrapper met marges */
  .report-content{
    padding:12mm 16mm !important;
    box-sizing:border-box;
  }

  /* Hoofdstukbalk altijd bovenaan, nooit alleen */
  .ch-bar{
    page-break-before:auto;
    page-break-after:avoid !important;
    break-after:avoid !important;
  }

  /* Sectie-inhoud na hoofdstukbalk samen houden */
  .rc-section{
    page-break-inside:avoid;
    break-inside:avoid;
  }

  /* Afbeeldingen nooit knippen */
  img{
    page-break-inside:avoid !important;
    break-inside:avoid !important;
    max-width:100% !important;
    display:block !important;
  }

  /* Print-blokken (grafieken, tabellen) */
  .print-block{
    page-break-inside:avoid !important;
    break-inside:avoid !important;
    display:block !important;
  }

  /* Tabellen */
  table{
    page-break-inside:avoid !important;
    break-inside:avoid !important;
  }

  /* KPI rij */
  .krow{
    page-break-inside:avoid !important;
    break-inside:avoid !important;
    display:flex !important;
  }

  /* Titels nooit onderaan pagina */
  h1,h2,h3{
    page-break-after:avoid !important;
    break-after:avoid !important;
  }

  /* Paragraaf weesregels */
  p{ orphans:3; widows:3; }

  /* Elke grafiek-caption + afbeelding als één blok */
  .img-block{
    page-break-inside:avoid !important;
    break-inside:avoid !important;
    display:block !important;
    margin-bottom:12px;
  }

  /* Forceer nieuwe pagina voor grote secties */
  .page-break-before{
    page-break-before:always !important;
    break-before:page !important;
  }
}
</style>
</head>

</div>

</div>

function $(id){ return document.getElementById(id); }

function hasMisura(id){ return D.misure_sel.indexOf(id)!==-1; }
function toggleMisura(id){

function showInfo(e,id){
  e.stopPropagation();

  else { for(var a=0;a<MISURE_CATS.length;a++){ for(var b=0;b<MISURE_CATS[a].items.length;b++){ if(MISURE_CATS[a].items[b].id===id){info=MISURE_CATS[a].items[b].info;break;} } } }
  if(!info) return;
  var popup=$('info-popup');
  $('info-popup-text').innerHTML=info.replace(/\n/g,'<br>');
  popup.style.display='block';
  popup.style.left=Math.min(e.clientX+10,window.innerWidth-320)+'px';
  popup.style.top=Math.min(e.clientY+10,window.innerHeight-160)+'px';

function addCustomMisura(){
  var t=$('cm-titolo')?$('cm-titolo').value.trim():''; if(!t){alert('Inserisci un titolo.');return;}
  var info=$('cm-info')?$('cm-info').value.trim():'';
  var assi=[1,2,3,4,5].filter(function(a){return $('cm-asse'+a)&&$('cm-asse'+a).checked;});

function removeCustom(e,idx){
  e.stopPropagation();
  D.misure_custom.splice(idx,1);
  var ns=[];
  D.misure_sel.forEach(function(id){ if(id.charAt(0)!=='c'){ns.push(id);} else{var i=parseInt(id.slice(1)); if(i<idx) ns.push(id); else if(i>idx) ns.push('c'+(i-1));} });
  D.misure_sel=ns; render(cur);
}
function getMisureSelezionate(){
  var r=[];
  MISURE_CATS.forEach(function(cat){ cat.items.forEach(function(m){ if(hasMisura(m.id)) r.push({titolo:m.titolo,assi:m.assi,cat:cat.cat}); }); });
  D.misure_custom.forEach(function(m,i){ if(hasMisura('c'+i)) r.push({titolo:m.titolo,assi:m.assi||[],cat:'Misure personalizzate'}); });
  return r;
}

function savePlan(idx){
  if(!D.pianificazione) D.pianificazione=[];
  while(D.pianificazione.length<=idx) D.pianificazione.push({inizio:'',fine:''});
  var ei=$('plan-inizio-'+idx), ef=$('plan-fine-'+idx);
  D.pianificazione[idx]={inizio:ei?ei.value:'', fine:ef?ef.value:''};
}

function calcAll(){
  var b1=Math.max(0.1,num('p1_tasso_occ')),b2=Math.max(0.1,num('p2_tasso_occ'));
  var eC=161.71922/1000,eN=0.304687/1000,eP=0.030991/1000;
  var p1a=num('n_auto'),p1c=num('dist_km')*2,p1d=num('p1_giorni');
  var p1={n:p1a,CO2:(((p1a/b1)*p1c)*p1d*eC).toFixed(2),NOx:(((p1a/b1)*p1c)*p1d*eN).toFixed(2),PM10:(((p1a/b1)*p1c)*p1d*eP).toFixed(2)};
  var p2a=num('p2_corse'),p2c=num('p2_distanza')*2,p2d=num('p2_giorni');
  var p2={n:p2a,CO2:(((p2a/b2)*p2c)*p2d*eC).toFixed(2),NOx:(((p2a/b2)*p2c)*p2d*eN).toFixed(2),PM10:(((p2a/b2)*p2c)*p2d*eP).toFixed(2)};
  var p3a=num('p3_persone'),p3c=num('p3_dist_auto')*2,p3f=num('p3_giorni'),p3d=num('p3_viaggi_giorno'),p3e=num('p3_dist_navetta');
  var p3CO2=Math.max(0,(((p3a/1.2)*p3c)*p3f*eC)-(p3d*p3e*p3f*717.99813/1000));
  var p3NOx=Math.max(0,(((p3a/1.2)*p3c)*p3f*eN)-(p3d*p3e*p3f*3.269033/1000));
  var p3PM10=Math.max(0,(((p3a/1.2)*p3c)*p3f*eP)-(p3d*p3e*p3f*0.126615/1000));
  var p3={n:p3a,CO2:p3CO2.toFixed(2),NOx:p3NOx.toFixed(2),PM10:p3PM10.toFixed(2)};
  var tot={n:p1.n+p2.n+p3.n,CO2:(+p1.CO2+ +p2.CO2+ +p3.CO2).toFixed(2),NOx:(+p1.NOx+ +p2.NOx+ +p3.NOx).toFixed(2),PM10:(+p1.PM10+ +p2.PM10+ +p3.PM10).toFixed(2)};
  return {p1:p1,p2:p2,p3:p3,tot:tot};
}

function bindInput(id,key){ var el=$(id);if(!el)return; el.value=D[key]!==undefined?D[key]:''; el.addEventListener('input',function(){D[key]=el.value;updateCalc();updateModal();}); }
function bindYN(key){
  document.querySelectorAll('[data-yn="'+key+'"]').forEach(function(btn){
    var v=btn.dataset.val==='true';

  });

function updateCalc(){
  if(cur!==8)return; var c=calcAll();
  ['p1','p2','p3','tot'].forEach(function(p){ ['n','CO2','NOx','PM10'].forEach(function(k){ var e=$('pc-'+p+'-'+k);if(e)e.textContent=c[p][k]; }); });
}
function updateModal(){
  if(cur!==5)return; var t=(num('n_auto')+num('n_tpl')+num('n_attiva'))||1;
  var e1=$('ms-tot'),e2=$('ms-a'),e3=$('ms-t'),e4=$('ms-m');
  if(e1)e1.textContent=t;
  if(e2)e2.textContent=D.n_auto+' ('+(num('n_auto')/t*100).toFixed(1)+'%)';

}

  pendImg={dk:dk,sid:sid};
  navigator.clipboard.read().then(function(items){

// ═══════════════════════════════════════════════
// PIANIFICAZIONE TABLE (report + word)
// ═══════════════════════════════════════════════
function buildPianificazioneTable(cbg,ctxt,acc){
  var sel=getMisureSelezionate();
  if(!sel.length) return '<p style="color:#6b7280;font-style:italic">[Nessuna misura pianificata]</p>';

  // collect dates for gantt range
  var allDates=[];
  sel.forEach(function(m,idx){
    var plan=(D.pianificazione&&D.pianificazione[idx])||{inizio:'',fine:''};
    if(plan.inizio) allDates.push(new Date(plan.inizio));
    if(plan.fine)   allDates.push(new Date(plan.fine));
  });
  var hasGantt=allDates.length>=2;
  var minDate,maxDate,totalDays,months=[];
  var MNAMES=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  if(hasGantt){
    minDate=new Date(Math.min.apply(null,allDates));
    maxDate=new Date(Math.max.apply(null,allDates));
    minDate=new Date(minDate.getFullYear(),minDate.getMonth(),1);
    maxDate=new Date(maxDate.getFullYear(),maxDate.getMonth()+1,0);
    totalDays=Math.max(1,(maxDate-minDate)/86400000);
    var d=new Date(minDate);
    while(d<=maxDate){ months.push({y:d.getFullYear(),m:d.getMonth()}); d=new Date(d.getFullYear(),d.getMonth()+1,1); }
  }

  // group by cat
  var bycat={},catOrder=[];
  sel.forEach(function(m,idx){
    if(!bycat[m.cat]){bycat[m.cat]=[];catOrder.push(m.cat);}
    var plan=(D.pianificazione&&D.pianificazione[idx])||{inizio:'',fine:''};
    bycat[m.cat].push({m:m,plan:plan});
  });

  // gantt header cells
  var ganttTh='';
  if(hasGantt){
    var mCells=months.map(function(mo){
      var mStart=new Date(mo.y,mo.m,1),mEnd=new Date(mo.y,mo.m+1,0);
      var left=Math.max(0,(mStart-minDate)/86400000/totalDays*100);
      var width=Math.min(100-left,(mEnd-mStart)/86400000/totalDays*100+0.5);
      return '<div style="position:absolute;left:'+left.toFixed(1)+'%;width:'+width.toFixed(1)+'%;text-align:center;font-size:9px;font-weight:700;color:'+cbg+';border-right:1px solid rgba(255,255,255,.2);overflow:hidden;white-space:nowrap">'+MNAMES[mo.m]+' '+mo.y+'</div>';
    }).join('');
    ganttTh='<th style="background:'+cbg+';color:'+ctxt+';padding:8px 12px;min-width:320px"><div style="position:relative;height:18px">'+mCells+'</div></th>';
  }

  var tbody='';
  catOrder.forEach(function(cat){
    var cols=3+(hasGantt?1:0);
    tbody+='<tr><td colspan="'+cols+'" style="background:#f1f5f9;padding:6px 12px;font-size:10.5px;font-weight:800;color:#374151;text-transform:uppercase;letter-spacing:.5px">'+cat+'</td></tr>';
    bycat[cat].forEach(function(entry,ri){
      var m=entry.m,plan=entry.plan;
      var assiHtml=m.assi.map(function(a){return '<span style="background:#eff6ff;color:#1d4ed8;border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700;margin-right:2px">A'+a+'</span>';}).join('');
      var bar='';
      if(hasGantt){
        if(plan.inizio&&plan.fine){
          var s=new Date(plan.inizio),e2=new Date(plan.fine);
          if(s<=e2){
            var left=Math.max(0,(s-minDate)/86400000/totalDays*100);
            var width=Math.min(100-left,Math.max(1,(e2-s)/86400000/totalDays*100));
            bar='<div style="position:relative;height:22px"><div style="position:absolute;left:'+left.toFixed(1)+'%;width:'+width.toFixed(1)+'%;height:16px;top:3px;background:'+cbg+';border-radius:4px;opacity:.8"></div></div>';
          }
        } else {
          bar='<div style="height:22px;font-size:10px;color:#9ca3af;padding-top:4px;font-style:italic">Date non inserite</div>';
        }
      }
      var bg=ri%2===0?'#fff':'#f8fafc';
      tbody+='<tr style="background:'+bg+'">'
        +'<td style="padding:8px 12px;border-bottom:1px solid #f1f5f9;font-size:12px;vertical-align:middle"><div style="font-weight:600">'+m.titolo+'</div><div style="margin-top:2px">'+assiHtml+'</div></td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #f1f5f9;font-size:11px;text-align:center;white-space:nowrap;color:#374151">'+fmtDate(plan.inizio)+'</td>'
        +'<td style="padding:8px 10px;border-bottom:1px solid #f1f5f9;font-size:11px;text-align:center;white-space:nowrap;color:#374151">'+fmtDate(plan.fine)+'</td>'
        +(hasGantt?'<td style="padding:4px 12px;border-bottom:1px solid #f1f5f9;min-width:320px">'+bar+'</td>':'')
        +'</tr>';
    });
  });

  return '<div class="print-block" style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px">'
    +'<thead><tr>'
    +'<th style="background:'+cbg+';color:'+ctxt+';padding:8px 12px;text-align:left;font-size:11px;min-width:180px">Misura</th>'
    +'<th style="background:'+cbg+';color:'+ctxt+';padding:8px 12px;text-align:center;font-size:11px;white-space:nowrap">Inizio</th>'
    +'<th style="background:'+cbg+';color:'+ctxt+';padding:8px 12px;text-align:center;font-size:11px;white-space:nowrap">Fine</th>'
    +ganttTh+'</tr></thead><tbody>'+tbody+'</tbody></table></div>';
}

function render(n){
  var steps=[sStyle,s0,s1,s2,s3,s4,s5,s6,s7,s8];
  $('fv').innerHTML=steps[n]();

function doWordExport(){
  var c=calcAll();

  var pA=(num('n_auto')/tot*100).toFixed(1),pT=(num('n_tpl')/tot*100).toFixed(1),pM=(num('n_attiva')/tot*100).toFixed(1);
  var aN=Number(D.anno)+1;
  var overstapW=Math.min(num('n_auto'), +c.p1.n + +c.p2.n + +c.p3.n);
  var nA2=Math.max(0, num('n_auto') - overstapW);
  var nT2=num('n_tpl') + +c.p1.n;
  var pA2=(nA2/tot*100).toFixed(1),pT2=(nT2/tot*100).toFixed(1);
  var svcs=[D.stazione&&'stazione ferroviaria',D.metro&&'metropolitana',D.bus&&'bus/tram',D.bike_sharing&&'bike sharing',D.car_sharing&&'car sharing',D.piste&&'piste ciclabili'].filter(Boolean);

  function wi2(dk1,lbl1,dk2,lbl2){ return '<table style="width:100%;border-collapse:collapse"><tr><td style="width:50%;vertical-align:top;padding-right:8pt">'+wi(dk1,lbl1)+'</td><td style="width:50%;vertical-align:top;padding-left:8pt">'+wi(dk2,lbl2)+'</td></tr></table>'; }
  function kpiW(items){ return '<table style="width:100%;border-collapse:collapse;margin:8pt 0"><tr>'+items.map(function(it){return '<td style="width:'+(100/items.length)+'%;padding:8pt 10pt;background:#f8fafc;border-left:3pt solid '+it.c+';vertical-align:top"><div style="font-size:18pt;font-weight:bold;color:'+it.c+';font-family:\''+ft+'\'">'+it.v+'</div><div style="font-size:9pt;color:#6b7280;margin-top:2pt">'+it.l+'</div></td>';}).join('')+'</tr></table>'; }

    catOrder.forEach(function(cat){
      misureW+='<p style="font-size:10pt;font-weight:800;color:#374151;text-transform:uppercase;margin-top:10pt;border-bottom:1pt solid #e5e7eb;padding-bottom:3pt">'+cat+'</p>';

    });

  +'<h1>1 Introduzione</h1><p>PSCL redatto in conformita al <strong>D.I. 179/2021</strong>, anno <strong>'+D.anno+'</strong>, MM: <strong>'+(D.nome_mm||'—')+'</strong>.</p>'
  +'<h1>2 Parte Informativa e di Analisi</h1><h2>2.1 Condizioni Strutturali</h2>'
  +kpiW([{v:D.totale||'—',l:'Dipendenti',c:cbg},{v:D.risposte||'—',l:'Risposte',c:cbg},{v:D.orario_in+'-'+D.orario_out,l:'Orario',c:acc}])
  +'<h2>2.2 Offerta di Trasporto</h2><p>Entro 500m: <strong>'+(svcs.join(', ')||'nessun servizio')+'</strong>.</p>'
  +wi('img_tpl','Trasporto pubblico + dipendenti')+wi('img_calore','Mappa di calore')+wi('img_ragg_tpl','Raggiungibilita TPL')+wi('img_ragg_auto','Raggiungibilita auto')+wi('img_ragg_bici','Raggiungibilita bicicletta')+wi('img_ragg_piedi','Raggiungibilita a piedi')+wi('img_piste','Piste ciclabili')
  +'<h2>2.3 Modalita di Spostamento</h2>'
  +kpiW([{v:pA+'%',l:'Auto/moto',c:'#dc2626'},{v:pT+'%',l:'TPL',c:cbg},{v:pM+'%',l:'Attiva',c:'#16a34a'},{v:D.prop_pct+'%',l:'Cambio modale',c:acc}])
  +wi2('img_g_sede','Sede','img_g_mezzo','Mezzo principale')+wi2('img_g_sharing','Sharing','img_g_tpl','TPL')+wi2('img_g_alim','Alimentazione','img_g_gruppo','Gruppo')+wi2('img_g_eta','Eta','img_g_genere','Genere')+wi('img_g_giorni','Giorni lavoro')
  +'<h2>2.4 Propensione al Cambiamento</h2><p>Il <strong>'+D.prop_pct+'%</strong> e disponibile a cambiare modalita.</p>'
  +wi2('img_p_diverso','Viaggiare diversamente?','img_p_remoto','Lavoro da remoto?')+wi2('img_p_opzione','Quale opzione?','img_p_carpooling','Carpooling?')
  +'<h1>3 Parte Progettuale</h1><h2>3.1 Misure Anno '+aN+'</h2>'+misureW
  +'<h2>3.2 Stima Riduzione Emissioni</h2>'
  +'<table><thead><tr><th>Procedura</th><th style="text-align:right">Utenti</th><th style="text-align:right">CO2 kg/a</th><th style="text-align:right">NOx kg/a</th><th style="text-align:right">PM10 kg/a</th></tr></thead><tbody>'
  +'<tr><td>Proc. 1 SW/TPL/Attiva</td><td style="text-align:right">'+c.p1.n+'</td><td style="text-align:right">'+c.p1.CO2+'</td><td style="text-align:right">'+c.p1.NOx+'</td><td style="text-align:right">'+c.p1.PM10+'</td></tr>'
  +'<tr><td>Proc. 2 Carpooling</td><td style="text-align:right">'+c.p2.n+'</td><td style="text-align:right">'+c.p2.CO2+'</td><td style="text-align:right">'+c.p2.NOx+'</td><td style="text-align:right">'+c.p2.PM10+'</td></tr>'
  +'<tr><td>Proc. 3 Navetta</td><td style="text-align:right">'+c.p3.n+'</td><td style="text-align:right">'+c.p3.CO2+'</td><td style="text-align:right">'+c.p3.NOx+'</td><td style="text-align:right">'+c.p3.PM10+'</td></tr>'
  +'<tr style="font-weight:bold"><td>TOTALE</td><td style="text-align:right">'+c.tot.n+'</td><td style="text-align:right">'+c.tot.CO2+'</td><td style="text-align:right">'+c.tot.NOx+'</td><td style="text-align:right">'+c.tot.PM10+'</td></tr>'
  +'</tbody></table>'
  +'<h2>3.3 Variazione Modale Attesa</h2>'
  +'<table><thead><tr><th>Modalita</th><th style="text-align:right">Attuale</th><th style="text-align:right">Obiettivo</th><th style="text-align:right">Delta</th></tr></thead><tbody>'
  +'<tr><td>Auto/moto</td><td style="text-align:right">'+D.n_auto+' ('+pA+'%)</td><td style="text-align:right">'+nA2+' ('+pA2+'%)</td><td style="text-align:right;color:#dc2626;font-weight:bold">-'+c.tot.n+'</td></tr>'

  +'<tr><td>Mobilita attiva</td><td style="text-align:right">'+D.n_attiva+'</td><td style="text-align:right">'+D.n_attiva+'</td><td style="text-align:right">—</td></tr>'

function goTo(n){
  cur=n;
  var isReport=n===STEPS.length-1;
  $('fv-wrap').style.display=isReport?'none':'block';
  $('rv').style.display=isReport?'block':'none';
  if(isReport){renderReport();}else{render(n);}
  $('sidebar').innerHTML=STEPS.map(function(l,i){return '<div class="sitem'+(i===cur?' active':i<cur?' done':'')+'" onclick="goTo('+i+')"><span style="width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0;display:inline-block"></span> '+l+'</div>';}).join('');
  $('tbar-t').textContent=STEPS[cur];
  $('tbar-s').textContent='Passaggio '+(cur+1)+' di '+STEPS.length;
  var bp=$('bp'),bn=$('bn'),nb=$('nbtns');
  if(!isReport&&bp&&bn&&nb){nb.style.display='flex';bp.disabled=(cur===0);var last=cur===STEPS.length-2;bn.textContent=last?'Genera PSCL':'Avanti';bn.className='nb '+(last?'gen':'next');}
  window.scrollTo({top:0,behavior:'smooth'});
}
function next(){if(cur<STEPS.length-1)goTo(cur+1);}
function prev(){if(cur>0)goTo(cur-1);}
goTo(0);
